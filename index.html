<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#185FA5"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Pádel"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Marcador de Pádel</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede8;
      --text: #1a1a18;
      --text2: #6b6a66;
      --text3: #9b9a96;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --blue-dark: #0C447C;
      --orange: #D85A30;
      --orange-light: #FAECE7;
      --orange-dark: #4A1B0C;
      --green: #1D9E75;
      --amber: #BA7517;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg2: #2c2c2e;
        --bg3: #3a3a3c;
        --text: #f2f2f7;
        --text2: #aeaeb2;
        --text3: #6d6d72;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
        --blue-light: #0c2d4a;
        --blue-dark: #85B7EB;
        --orange-light: #3a1a0a;
        --orange-dark: #F09975;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); touch-action: manipulation; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    .app { max-width: 430px; margin: 0 auto; padding: 14px 14px 40px; }

    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .match-title { font-size: 13px; color: var(--text2); }
    .btn-reset { font-size: 12px; padding: 7px 16px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; }

    .sets-pills { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .pill { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border); color: var(--text2); background: var(--bg2); }
    .pill.active { background: var(--green); color: #fff; border-color: var(--green); }
    .pill.won-a { background: var(--blue); color: #fff; border-color: var(--blue); }
    .pill.won-b { background: var(--orange); color: #fff; border-color: var(--orange); }

    .board { border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; background: var(--bg); margin-bottom: 10px; }
    .board-top { display: grid; grid-template-columns: 1fr 36px 1fr; }
    .team-col { padding: 16px 8px; text-align: center; }
    .team-col.a { border-right: 0.5px solid var(--border); }
    .team-col.b { border-left: 0.5px solid var(--border); }
    .tname input { background: transparent; border: none; border-bottom: 0.5px solid var(--border2); color: var(--text); font-size: 14px; font-weight: 500; text-align: center; width: 100%; outline: none; padding: 2px 0; font-family: var(--font); }
    .tscore { font-size: 68px; font-weight: 500; line-height: 1.1; color: var(--text); margin: 4px 0; }
    .tgames { font-size: 12px; color: var(--text2); }
    .mid-col { display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 18px; }

    .board-sets { display: grid; grid-template-columns: 1fr 36px 1fr; border-top: 0.5px solid var(--border); }
    .sval { text-align: center; padding: 10px 4px; font-size: 26px; font-weight: 500; color: var(--text); }
    .sval.a { border-right: 0.5px solid var(--border); }
    .sval.b { border-left: 0.5px solid var(--border); }
    .slabel { display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text2); }

    .status { text-align: center; font-size: 14px; color: var(--text2); margin: 8px 0 12px; min-height: 22px; }
    .winner { font-size: 17px; font-weight: 500; color: var(--green); }
    .deuce { font-weight: 500; color: var(--amber); }

    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .btn-pt { padding: 32px 10px; border-radius: var(--radius); font-size: 18px; font-weight: 500; cursor: pointer; border: none; transition: transform 0.1s; user-select: none; }
    .btn-pt:active, .btn-pt.flash { transform: scale(0.95); }
    .btn-pt.a { background: var(--blue); color: #fff; }
    .btn-pt.b { background: var(--orange); color: #fff; }
    .btn-pt:disabled { opacity: 0.35; cursor: default; }
    .btn-pt .sub { font-size: 12px; font-weight: 400; opacity: 0.85; display: block; margin-top: 4px; }
    .btn-pt .key-hint { font-size: 11px; opacity: 0.6; display: block; margin-top: 6px; font-weight: 400; }

    .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .btn-act { padding: 13px 4px; border-radius: 12px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; cursor: pointer; text-align: center; }
    .btn-act.undo { color: var(--orange); border-color: var(--orange); }
    .btn-act:active { transform: scale(0.97); }

    .bt-card { border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg); padding: 14px 16px; margin-bottom: 14px; }
    .bt-row { display: flex; align-items: center; justify-content: space-between; }
    .bt-left { display: flex; align-items: center; gap: 10px; }
    .bt-led { width: 9px; height: 9px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
    .bt-led.on { background: var(--green); animation: blink 1.5s infinite; }
    .bt-led.connecting { background: var(--amber); animation: blink 0.6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .bt-info { font-size: 13px; color: var(--text); }
    .bt-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .btn-bt { font-size: 12px; padding: 7px 14px; border-radius: 10px; border: 0.5px solid var(--blue); background: var(--blue-light); color: var(--blue-dark); cursor: pointer; white-space: nowrap; }

    .bt-mapping { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); display: none; }
    .bt-mapping.show { display: block; }
    .map-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .map-rows { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .map-row { background: var(--bg2); border-radius: 10px; padding: 10px; text-align: center; }
    .map-key { font-size: 20px; font-weight: 500; }
    .map-row.a .map-key { color: var(--blue); }
    .map-row.b .map-key { color: var(--orange); }
    .map-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .sys-note { font-size: 12px; color: var(--text2); margin-top: 10px; padding: 10px 12px; border-radius: 10px; background: var(--bg2); line-height: 1.6; }

    .history { border-top: 0.5px solid var(--border); padding-top: 12px; }
    .hist-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .hist-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text2); padding: 7px 0; border-bottom: 0.5px solid var(--border); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .ba { background: var(--blue-light); color: var(--blue-dark); }
    .bb { background: var(--orange-light); color: var(--orange-dark); }

    .install-banner { display: none; align-items: center; justify-content: space-between; gap: 10px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 12px 14px; margin-bottom: 12px; }
    .install-banner.show { display: flex; }
    .install-text { font-size: 13px; color: var(--text); line-height: 1.4; }
    .install-text span { display: block; font-size: 11px; color: var(--text2); margin-top: 2px; }
    .btn-install { font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 10px; border: none; background: var(--blue); color: #fff; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <span class="match-title">Mejor de 3 sets</span>
    <button class="btn-reset" onclick="resetAll()">Reiniciar</button>
  </div>

  <div class="install-banner" id="install-banner">
    <div class="install-text">
      Instalá la app
      <span>Disponible en tu pantalla de inicio</span>
    </div>
    <button class="btn-install" id="btn-install">Instalar</button>
  </div>

  <div class="sets-pills" id="pills"></div>

  <div class="board">
    <div class="board-top">
      <div class="team-col a">
        <div class="tname"><input id="na" value="Equipo A" maxlength="10"/></div>
        <div class="tscore" id="sa">0</div>
        <div class="tgames" id="ga">0 games</div>
      </div>
      <div class="mid-col">-</div>
      <div class="team-col b">
        <div class="tname"><input id="nb" value="Equipo B" maxlength="10"/></div>
        <div class="tscore" id="sb">0</div>
        <div class="tgames" id="gb">0 games</div>
      </div>
    </div>
    <div class="board-sets">
      <div class="sval a" id="setsA">0</div>
      <div class="slabel">sets</div>
      <div class="sval b" id="setsB">0</div>
    </div>
  </div>

  <div class="status" id="status">Sirve Equipo A</div>

  <div class="btns">
    <button class="btn-pt a" id="btnA" onclick="addPoint('a')">
      +1 punto
      <span class="sub" id="lbA">Equipo A</span>
      <span class="key-hint" id="hintA">Tecla: —</span>
    </button>
    <button class="btn-pt b" id="btnB" onclick="addPoint('b')">
      +1 punto
      <span class="sub" id="lbB">Equipo B</span>
      <span class="key-hint" id="hintB">Tecla: —</span>
    </button>
  </div>

  <div class="actions">
    <button class="btn-act undo" onclick="undo()">↩ Deshacer</button>
    <button class="btn-act" onclick="newSet()">Nuevo set</button>
    <button class="btn-act" onclick="swapServe()">Servicio ⇄</button>
  </div>

  <div class="bt-card">
    <div class="bt-row">
      <div class="bt-left">
        <div class="bt-led" id="btled"></div>
        <div>
          <div class="bt-info" id="bt-info">Control Bluetooth HID</div>
          <div class="bt-sub" id="bt-sub">Funciona en Android e iOS</div>
        </div>
      </div>
      <button class="btn-bt" id="btn-bt" onclick="setupBT()">Configurar</button>
    </div>
    <div class="bt-mapping" id="bt-mapping">
      <div class="map-title">Presioná cada botón en tu control:</div>
      <div class="map-rows">
        <div class="map-row a">
          <div class="map-key" id="mk-a">?</div>
          <div class="map-label" id="ml-a">Botón Equipo A</div>
        </div>
        <div class="map-row b">
          <div class="map-key" id="mk-b">?</div>
          <div class="map-label" id="ml-b">Botón Equipo B</div>
        </div>
      </div>
      <div class="sys-note" id="sys-note"></div>
    </div>
  </div>

  <div id="hist-section" style="display:none">
    <div class="history">
      <div class="hist-title">Historial de sets</div>
      <div id="hist-list"></div>
    </div>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('btn-install').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
    });
  }
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
});

const PTS = ['0','15','30','40'];
let prev = null, S = fresh();
let keyA = null, keyB = null, btPhase = null;

function fresh(){ return {pA:0,pB:0,gA:0,gB:0,sA:0,sB:0,sets:[],serve:'a',deuce:false,over:false}; }
function nameA(){ return document.getElementById('na').value || 'Equipo A'; }
function nameB(){ return document.getElementById('nb').value || 'Equipo B'; }
function ptLabel(me, other, d){ if(!d) return PTS[Math.min(me,3)]; return me > other ? 'ADV' : '40'; }

function flashBtn(id){
  const b = document.getElementById(id);
  b.classList.add('flash');
  setTimeout(() => b.classList.remove('flash'), 150);
}

function displayKey(k){
  if(!k) return '—';
  if(k.startsWith('Key')) return k.replace('Key','');
  if(k.startsWith('Digit')) return k.replace('Digit','');
  const map = {ArrowLeft:'←',ArrowRight:'→',ArrowUp:'↑',ArrowDown:'↓',Enter:'↵',Space:'Esp'};
  return map[k] || k.slice(0,5);
}

function render(){
  const lA = S.deuce ? ptLabel(S.pA,S.pB,true) : PTS[Math.min(S.pA,3)];
  const lB = S.deuce ? ptLabel(S.pB,S.pA,true) : PTS[Math.min(S.pB,3)];
  document.getElementById('sa').textContent = lA;
  document.getElementById('sb').textContent = lB;
  document.getElementById('ga').textContent = S.gA + (S.gA===1?' game':' games');
  document.getElementById('gb').textContent = S.gB + (S.gB===1?' game':' games');
  document.getElementById('setsA').textContent = S.sA;
  document.getElementById('setsB').textContent = S.sB;
  document.getElementById('lbA').textContent = nameA();
  document.getElementById('lbB').textContent = nameB();
  document.getElementById('hintA').textContent = keyA ? 'Tecla: '+displayKey(keyA) : 'Tecla: —';
  document.getElementById('hintB').textContent = keyB ? 'Tecla: '+displayKey(keyB) : 'Tecla: —';

  const st = document.getElementById('status');
  if(S.over){ const w = S.sA>=2?nameA():nameB(); st.innerHTML='<span class="winner">Ganador: '+w+'</span>'; }
  else if(S.deuce){ st.innerHTML='<span class="deuce">Deuce!</span>'; }
  else { st.textContent = 'Sirve ' + (S.serve==='a'?nameA():nameB()); }

  document.getElementById('btnA').disabled = S.over;
  document.getElementById('btnB').disabled = S.over;

  const pills = document.getElementById('pills');
  pills.innerHTML = '';
  for(let i=0;i<3;i++){
    const d = document.createElement('div');
    if(i < S.sets.length){
      const x = S.sets[i];
      d.className = 'pill '+(x.a>x.b?'won-a':'won-b');
      d.textContent = 'Set '+(i+1)+': '+x.a+'-'+x.b;
    } else if(i === S.sets.length){
      d.className = 'pill active';
      d.textContent = 'Set '+(i+1)+' (en curso)';
    } else {
      d.className = 'pill';
      d.textContent = 'Set '+(i+1);
    }
    pills.appendChild(d);
  }

  const hs = document.getElementById('hist-section');
  if(S.sets.length > 0){
    hs.style.display = 'block';
    document.getElementById('hist-list').innerHTML = S.sets.map((x,i) => {
      const w = x.a>x.b ? '<span class="badge ba">'+nameA()+'</span>' : '<span class="badge bb">'+nameB()+'</span>';
      return '<div class="hist-row"><span>Set '+(i+1)+'</span><span>'+x.a+' — '+x.b+' '+w+'</span></div>';
    }).join('');
  } else { hs.style.display = 'none'; }
}

function addPoint(t){
  if(S.over) return;
  prev = JSON.parse(JSON.stringify(S));
  if(t==='a') S.pA++; else S.pB++;
  const a=S.pA, b=S.pB;
  if(a>=3 && b>=3){ S.deuce=true; if(Math.abs(a-b)>=2) winGame(a>b?'a':'b'); }
  else if(a>=4) winGame('a');
  else if(b>=4) winGame('b');
  render();
}
function winGame(t){
  if(t==='a') S.gA++; else S.gB++;
  S.pA=0; S.pB=0; S.deuce=false;
  S.serve = S.serve==='a'?'b':'a';
  const ga=S.gA, gb=S.gB;
  if((ga>=6 && ga-gb>=2)||ga===7) winSet('a');
  else if((gb>=6 && gb-ga>=2)||gb===7) winSet('b');
}
function winSet(t){
  S.sets.push({a:S.gA, b:S.gB});
  if(t==='a') S.sA++; else S.sB++;
  S.gA=0; S.gB=0;
  if(S.sA>=2 || S.sB>=2) S.over=true;
}
function undo(){ if(prev){ S=prev; prev=null; render(); } }
function swapServe(){ prev=JSON.parse(JSON.stringify(S)); S.serve=S.serve==='a'?'b':'a'; render(); }
function newSet(){ prev=JSON.parse(JSON.stringify(S)); S.pA=0; S.pB=0; S.gA=0; S.gB=0; S.deuce=false; render(); }
function resetAll(){ if(confirm('¿Reiniciar el partido completo?')){ S=fresh(); prev=null; render(); } }

function setupBT(){
  const mapping = document.getElementById('bt-mapping');
  mapping.classList.add('show');
  btPhase='waitA'; keyA=null; keyB=null;
  document.getElementById('mk-a').textContent = '?';
  document.getElementById('mk-b').textContent = '?';
  document.getElementById('ml-a').textContent = 'Presioná botón para '+nameA();
  document.getElementById('ml-b').textContent = 'Esperando...';
  document.getElementById('btled').className = 'bt-led connecting';
  document.getElementById('bt-info').textContent = 'Esperando botón A...';
  document.getElementById('bt-sub').textContent = 'Presioná el botón del control para '+nameA();
  document.getElementById('btn-bt').textContent = 'Cancelar';
  document.getElementById('btn-bt').onclick = cancelBT;

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  const note = document.getElementById('sys-note');
  note.textContent = isIOS
    ? 'iPhone: Conectá el control en Ajustes → Bluetooth, luego volvé aquí y presioná cada botón.'
    : 'Android: Conectá el control en Ajustes → Bluetooth, luego presioná cada botón aquí.';
}

function cancelBT(){
  btPhase = null;
  document.getElementById('bt-mapping').classList.remove('show');
  document.getElementById('btled').className = 'bt-led' + (keyA&&keyB?' on':'');
  document.getElementById('bt-info').textContent = 'Control Bluetooth HID';
  document.getElementById('bt-sub').textContent = 'Funciona en Android e iOS';
  document.getElementById('btn-bt').textContent = 'Configurar';
  document.getElementById('btn-bt').onclick = setupBT;
}

document.addEventListener('keydown', function(e){
  if(['F5','F11','F12','Tab'].includes(e.key)) return;
  e.preventDefault();
  if(btPhase==='waitA'){
    if(e.code===keyB) return;
    keyA = e.code;
    document.getElementById('mk-a').textContent = displayKey(e.code);
    document.getElementById('ml-a').textContent = 'Botón A: '+displayKey(e.code);
    btPhase = 'waitB';
    document.getElementById('ml-b').textContent = 'Ahora botón para '+nameB();
    document.getElementById('bt-info').textContent = 'Esperando botón B...';
    document.getElementById('bt-sub').textContent = 'Presioná el botón del control para '+nameB();
    flashBtn('btnA'); return;
  }
  if(btPhase==='waitB'){
    if(e.code===keyA) return;
    keyB = e.code;
    document.getElementById('mk-b').textContent = displayKey(e.code);
    document.getElementById('ml-b').textContent = 'Botón B: '+displayKey(e.code);
    btPhase = 'done';
    document.getElementById('btled').className = 'bt-led on';
    document.getElementById('bt-info').textContent = 'Control conectado';
    document.getElementById('bt-sub').textContent = displayKey(keyA)+' = '+nameA()+'   '+displayKey(keyB)+' = '+nameB();
    document.getElementById('btn-bt').textContent = 'Reconfigurar';
    document.getElementById('btn-bt').onclick = setupBT;
    flashBtn('btnB'); render(); return;
  }
  if(keyA && e.code===keyA){ addPoint('a'); flashBtn('btnA'); }
  else if(keyB && e.code===keyB){ addPoint('b'); flashBtn('btnB'); }
});

document.getElementById('na').addEventListener('input', render);
document.getElementById('nb').addEventListener('input', render);
render();
</script>
</body>
</html>
